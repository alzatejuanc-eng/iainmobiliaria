<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SinergIA · Historial de Diagnósticos</title>
<link rel="stylesheet" href="estilos.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="topbar-brand">Sinerg<span>IA</span></div>
    <div class="topbar-actions">
      <span class="topbar-sub">Historial de diagnósticos</span>
      <a href="diagnostico.html" class="topbar-hist" style="display:flex">
        + Nuevo diagnóstico
      </a>
    </div>
  </header>
  <main class="main" id="main">
    <div style="text-align:center;padding:60px 0;color:#64748B">Cargando historial...</div>
  </main>
  <footer class="footer">
    <div><strong>SinergIA</strong> by Human+AI · IA que multiplica, no reemplaza · 2026</div>
    <div>Los datos se almacenan localmente en este navegador</div>
  </footer>
</div>

<div class="toast" id="toast"></div>

<script src="datos.js"></script>
<script>
const STORAGE_KEY = 'sinergia_evaluaciones';

function storageGet(key) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
  catch(e) { return null; }
}
function storageSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); return true; }
  catch(e) { return false; }
}
function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  if (!t) return;
  t.className = 'toast toast-'+type+' show';
  t.textContent = msg;
  setTimeout(()=>t.classList.remove('show'), 4000);
}
function statusFor(pct) {
  if (pct<35) return { label:'Crítico',       color:'#DC2626', bg:'#FEE2E2' };
  if (pct<55) return { label:'Deficiente',    color:'#D97706', bg:'#FEF3C7' };
  if (pct<70) return { label:'En desarrollo', color:'#0D9488', bg:'#CCFBF1' };
  if (pct<85) return { label:'Maduro',        color:'#1E40AF', bg:'#DBEAFE' };
  return             { label:'Optimizado',    color:'#064E3B', bg:'#D1FAE5' };
}
function fmtDate(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('es-EC', { day:'2-digit', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' });
  } catch(e) { return iso; }
}

// ── MAIN RENDER ──────────────────────────────────────────────
function render() {
  const evaluaciones = storageGet(STORAGE_KEY) || [];
  const main = document.getElementById('main');

  if (evaluaciones.length === 0) {
    main.innerHTML = `
<div class="empty-state anim">
  <div class="es-icon">📋</div>
  <div class="es-title">Aún no hay diagnósticos guardados</div>
  <div class="es-sub">Complete el diagnóstico de madurez y los resultados se guardarán automáticamente aquí para que pueda consultarlos cuando quiera y comparar evolución entre evaluaciones.</div>
  <a href="diagnostico.html" class="btn btn-primary">Iniciar primer diagnóstico →</a>
</div>`;
    return;
  }

  const ol = statusFor(evaluaciones.reduce((a,e)=>a+e.total, 0) / evaluaciones.length);

  main.innerHTML = `
<div class="anim">
<div class="hist-hero">
  <div class="hh-label">SinergIA · Historial de evaluaciones</div>
  <h1 class="hh-title">${evaluaciones.length} diagnóstico${evaluaciones.length>1?'s':''} guardado${evaluaciones.length>1?'s':''}</h1>
  <p class="hh-sub">Todos sus diagnósticos de madurez digital en gestión de proyectos y construcción. Los resultados más recientes aparecen primero.</p>
</div>

<div class="hist-meta">
  <div class="hist-count">${evaluaciones.length} evaluación${evaluaciones.length>1?'es':''} — ordenadas de más reciente a más antigua</div>
  <div class="hist-actions">
    <a href="diagnostico.html" class="btn btn-primary">+ Nuevo diagnóstico</a>
    <button class="btn btn-ghost" onclick="exportarTodo()">Exportar todo (texto)</button>
    <button class="btn btn-red" onclick="confirmarBorrarTodo()">Borrar todo</button>
  </div>
</div>

<div id="eval-list">
  ${evaluaciones.map((ev, idx) => renderEvalCard(ev, idx)).join('')}
</div>
</div>`;

  // Animate bars after render
  setTimeout(() => {
    document.querySelectorAll('.ebs-bar-fill[data-w]').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  }, 100);
}

function renderEvalCard(ev, idx) {
  const st     = statusFor(ev.total);
  const meta   = [ev.sector, ev.tamanio, ev.proyectos].filter(Boolean).join(' · ');
  const puntajes = ev.puntajes || [];
  const roadmap  = ev.roadmap  || [];
  const answersHTML = buildAnswersHTML(ev);

  return `
<div class="eval-card" id="ec-${idx}">
  <div class="eval-head" onclick="toggleCard(${idx})">
    <div class="eh-score">
      <div class="es-num" style="color:${st.color}">${ev.total}</div>
      <div class="es-label" style="color:${st.color}">${ev.etiqueta}</div>
    </div>
    <div class="eh-info">
      <div class="ei-company">${ev.empresa}</div>
      <div class="ei-meta">${fmtDate(ev.fecha)}${ev.contacto?' · '+ev.contacto:''}${meta?' · '+meta:''}</div>
    </div>
    <div class="eh-actions">
      <button class="btn btn-ghost" style="font-size:12px;padding:7px 14px" onclick="imprimirEval(${idx},event)">Imprimir</button>
      <button class="btn btn-ghost" style="font-size:12px;padding:7px 14px" onclick="copiarEval(${idx},event)">Copiar</button>
      <button class="btn btn-red" style="font-size:12px;padding:7px 14px" onclick="borrarEval(${idx},event)">Borrar</button>
      <button class="eval-toggle" onclick="toggleCard(${idx});event.stopPropagation()">▾</button>
    </div>
  </div>
  <div class="eval-body">
    <!-- Scores grid -->
    <div style="font-size:11px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">Resultados por área</div>
    <div class="eb-scores">
      ${puntajes.map(p=>{
        const ps = statusFor(p.pct);
        return `<div class="ebs-card">
          <div class="ebs-label">${p.label}</div>
          <div class="ebs-pct" style="color:${ps.color}">${p.pct}%</div>
          <div class="ebs-bar"><div class="ebs-bar-fill" style="width:0%;background:${ps.color};transition:width 1s" data-w="${p.pct}"></div></div>
          <div class="ebs-status" style="color:${ps.color}">${ps.label} · ${p.weight}%</div>
        </div>`;
      }).join('')}
    </div>

    <!-- Roadmap -->
    ${roadmap.length>0?`
    <div class="eb-roadmap">
      <div class="eb-roadmap-title">Roadmap propuesto</div>
      <div class="eb-roadmap-grid">
        ${roadmap.map((rm,i)=>`<div class="ebrm ${i===0?'first':''}">
          <div class="ebrm-week">Semanas ${i*3+1}–${i*3+3}</div>
          <div class="ebrm-sprint">${rm.name}</div>
          <span class="ebrm-hrs">${rm.hrs}</span>
        </div>`).join('')}
      </div>
    </div>`:''}

    <!-- Respuestas detalladas -->
    <button class="eb-answers-btn" id="ab-${idx}" onclick="toggleAnswers(${idx})">
      Ver respuestas detalladas ▾
    </button>
    <div class="eb-answers" id="ans-${idx}">
      ${answersHTML}
    </div>
  </div>
</div>`;
}

function buildAnswersHTML(ev) {
  if (!ev.respuestas || !SECTIONS) return '<p style="font-size:13px;color:#64748B">Sin detalle de respuestas disponible.</p>';
  let html = '';
  SECTIONS.forEach((sec, si) => {
    html += `<div class="ans-section">
      <div class="ans-sec-title">${sec.label}</div>`;
    sec.questions.forEach((q, qi) => {
      const score = ev.respuestas[`${si}_${qi}`];
      if (score !== undefined) {
        const optText = q.opts[score-1] || '—';
        html += `<div class="ans-q">P${qi+1}: ${q.text.substring(0,80)}${q.text.length>80?'...':''}</div>
          <div class="ans-a">→ ${optText}</div>`;
      }
    });
    html += `</div>`;
  });
  return html || '<p style="font-size:13px;color:#64748B">Sin detalle disponible.</p>';
}

// ── INTERACTIONS ─────────────────────────────────────────────
function toggleCard(idx) {
  const card = document.getElementById('ec-'+idx);
  if (!card) return;
  const wasOpen = card.classList.contains('open');
  // close all
  document.querySelectorAll('.eval-card.open').forEach(c => c.classList.remove('open'));
  if (!wasOpen) {
    card.classList.add('open');
    // Animate bars
    setTimeout(() => {
      card.querySelectorAll('.ebs-bar-fill[data-w]').forEach(el => {
        el.style.width = el.dataset.w + '%';
      });
    }, 60);
  }
}

function toggleAnswers(idx) {
  const box = document.getElementById('ans-'+idx);
  const btn = document.getElementById('ab-'+idx);
  if (!box) return;
  const isOpen = box.classList.toggle('open');
  btn.textContent = isOpen ? 'Ocultar respuestas ▲' : 'Ver respuestas detalladas ▾';
}

function borrarEval(idx, event) {
  event.stopPropagation();
  const evaluaciones = storageGet(STORAGE_KEY) || [];
  const empresa = evaluaciones[idx]?.empresa || 'esta evaluación';
  if (!confirm(`¿Eliminar el diagnóstico de "${empresa}"? Esta acción no se puede deshacer.`)) return;
  evaluaciones.splice(idx, 1);
  storageSet(STORAGE_KEY, evaluaciones);
  showToast('Evaluación eliminada', 'ok');
  render();
}

function confirmarBorrarTodo() {
  const evaluaciones = storageGet(STORAGE_KEY) || [];
  if (evaluaciones.length === 0) return;
  if (!confirm(`¿Eliminar los ${evaluaciones.length} diagnósticos guardados? Esta acción no se puede deshacer.`)) return;
  localStorage.removeItem(STORAGE_KEY);
  showToast('Historial eliminado', 'ok');
  render();
}

function imprimirEval(idx, event) {
  event.stopPropagation();
  const evaluaciones = storageGet(STORAGE_KEY) || [];
  const ev = evaluaciones[idx];
  if (!ev) return;

  const win = window.open('', '_blank');
  if (!win) { alert('Permita ventanas emergentes para imprimir.'); return; }

  const st = statusFor(ev.total);
  const roadmap = ev.roadmap || [];
  const puntajes = ev.puntajes || [];

  win.document.write(`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<title>Diagnóstico ${ev.empresa} — SinergIA</title>
<style>
body{font-family:Arial,sans-serif;max-width:800px;margin:0 auto;padding:32px;color:#0F172A;font-size:14px}
h1{font-size:28px;margin-bottom:4px;color:#064E3B}
.meta{color:#64748B;font-size:13px;margin-bottom:24px}
.score{font-size:48px;font-weight:700;color:${st.color};margin-bottom:4px}
.label{font-size:14px;font-weight:600;color:${st.color};text-transform:uppercase;letter-spacing:.08em;margin-bottom:24px}
.section-title{font-size:16px;font-weight:600;color:#064E3B;margin-top:24px;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #D1FAE5}
.areas{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.area-card{border:1px solid #E2E8F0;border-radius:8px;padding:10px 12px}
.area-label{font-size:12px;font-weight:500;color:#0F172A;margin-bottom:2px}
.area-pct{font-size:20px;font-weight:700}
.area-status{font-size:11px}
.roadmap-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rm-item{border:1px solid #E2E8F0;border-radius:8px;padding:10px 12px}
.rm-item.first{border-color:#064E3B;border-width:2px}
.rm-week{font-size:10px;color:#64748B;text-transform:uppercase;letter-spacing:.08em}
.rm-name{font-size:13px;font-weight:600;color:#0F172A}
.rm-item.first .rm-name{color:#064E3B}
.rm-hrs{font-size:11px;font-weight:600;color:#064E3B;background:#D1FAE5;padding:2px 7px;border-radius:4px;display:inline-block;margin-top:4px}
footer{margin-top:40px;font-size:11px;color:#94A3B8;border-top:1px solid #E2E8F0;padding-top:12px}
</style></head><body>
<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
  <div>
    <h1>${ev.empresa}</h1>
    <div class="meta">${fmtDate(ev.fecha)}${ev.contacto?' · '+ev.contacto:''}${ev.sector?' · '+ev.sector:''}</div>
  </div>
  <div style="text-align:right">
    <div class="score">${ev.total}</div>
    <div class="label">${ev.etiqueta}</div>
  </div>
</div>
<div class="section-title">Resultados por área</div>
<div class="areas">
  ${puntajes.map(p=>{ const ps=statusFor(p.pct); return `<div class="area-card">
    <div class="area-label">${p.label} · ${p.weight}%</div>
    <div class="area-pct" style="color:${ps.color}">${p.pct}%</div>
    <div class="area-status" style="color:${ps.color}">${ps.label}</div>
  </div>`; }).join('')}
</div>
${roadmap.length>0?`
<div class="section-title">Roadmap propuesto de Sprints SinergIA</div>
<div class="roadmap-grid">
  ${roadmap.map((rm,i)=>`<div class="rm-item ${i===0?'first':''}">
    <div class="rm-week">Semanas ${i*3+1}–${i*3+3}</div>
    <div class="rm-name">${rm.name}</div>
    <div>${rm.area}</div>
    <span class="rm-hrs">${rm.hrs} recuperadas</span>
  </div>`).join('')}
</div>`:''}
<footer>SinergIA by Human+AI · IA que multiplica, no reemplaza · Diagnóstico generado el ${fmtDate(ev.fecha)}</footer>
</body></html>`);
  win.document.close();
  win.focus();
  setTimeout(()=>win.print(), 500);
}

function copiarEval(idx, event) {
  event.stopPropagation();
  const evaluaciones = storageGet(STORAGE_KEY) || [];
  const ev = evaluaciones[idx];
  if (!ev) return;

  const roadmap = ev.roadmap || [];
  const puntajes = ev.puntajes || [];
  let t = `DIAGNÓSTICO DE MADUREZ — ${ev.empresa}\n`;
  t += `Fecha: ${fmtDate(ev.fecha)} | Puntaje: ${ev.total}/100 — ${ev.etiqueta}\n`;
  if (ev.sector) t += `Sector: ${ev.sector}\n`;
  t += `\nRESULTADOS POR ÁREA:\n`;
  puntajes.forEach(p => { t += `· ${p.label}: ${p.pct}% — ${statusFor(p.pct).label}\n`; });
  if (roadmap.length > 0) {
    t += `\nROADMAP RECOMENDADO:\n`;
    roadmap.forEach((rm, i) => { t += `${i+1}. ${rm.name} (Semanas ${i*3+1}-${i*3+3}) — ${rm.hrs}\n`; });
  }
  t += `\nGenerado por SinergIA by Human+AI · 2026`;

  navigator.clipboard.writeText(t)
    .then(()=>showToast('✓ Resumen copiado al portapapeles', 'ok'))
    .catch(()=>alert('No se pudo copiar automáticamente. Use Ctrl+A en el texto.'));
}

function exportarTodo() {
  const evaluaciones = storageGet(STORAGE_KEY) || [];
  if (evaluaciones.length === 0) { showToast('No hay evaluaciones para exportar', 'warn'); return; }

  let t = `HISTORIAL DE DIAGNÓSTICOS — SinergIA\n`;
  t += `Exportado: ${new Date().toLocaleDateString('es-EC')}\n`;
  t += `Total de evaluaciones: ${evaluaciones.length}\n\n`;
  t += '='.repeat(60) + '\n\n';

  evaluaciones.forEach((ev, i) => {
    const puntajes = ev.puntajes || [];
    const roadmap  = ev.roadmap  || [];
    t += `EVALUACIÓN ${i+1}: ${ev.empresa}\n`;
    t += `Fecha: ${fmtDate(ev.fecha)} | Puntaje: ${ev.total}/100 — ${ev.etiqueta}\n`;
    if (ev.contacto) t += `Evaluador: ${ev.contacto}\n`;
    if (ev.sector)   t += `Sector: ${ev.sector}\n`;
    t += `\nPuntajes por área:\n`;
    puntajes.forEach(p => { t += `  · ${p.label}: ${p.pct}% — ${statusFor(p.pct).label}\n`; });
    if (roadmap.length > 0) {
      t += `\nRoadmap propuesto:\n`;
      roadmap.forEach((rm, j) => { t += `  ${j+1}. ${rm.name} — ${rm.hrs}\n`; });
    }
    t += '\n' + '-'.repeat(60) + '\n\n';
  });

  t += 'SinergIA by Human+AI · IA que multiplica, no reemplaza · 2026';

  // Create download
  const blob = new Blob([t], { type: 'text/plain;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `SinergIA_Historial_${new Date().toISOString().split('T')[0]}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Archivo descargado', 'ok');
}

render();
</script>
</body>
</html>
