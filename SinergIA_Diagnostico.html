<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SinergIA · Diagnóstico Área de Proyectos</title>
<link rel="stylesheet" href="estilos.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="topbar-brand">Sinerg<span>IA</span></div>
    <div class="topbar-actions">
      <span class="topbar-sub">Diagnóstico · Área de Proyectos y Construcción</span>

        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm.75 10.25h-1.5V7h1.5v4.25zm0-5.5h-1.5v-1.5h1.5v1.5z"/></svg>
        <span id="hist-count">Historial</span>
      </a>
    </div>
  </header>
  <main class="main" id="main"></main>
  <footer class="footer">
    <div><strong>SinergIA</strong> by Human+AI · IA que multiplica, no reemplaza · 2026</div>
    <div>Diagnóstico v3.0 · Mejores prácticas internacionales · Los resultados se guardan localmente</div>
  </footer>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="datos.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  STORAGE HELPERS
// ═══════════════════════════════════════════════════════════════
const STORAGE_KEY  = 'sinergia_evaluaciones';
const PROGRESS_KEY = 'sinergia_progreso';

function storageGet(key) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
  catch(e) { return null; }
}
function storageSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); return true; }
  catch(e) { return false; }
}
function storageRemove(key) {
  try { localStorage.removeItem(key); } catch(e) {}
}

function getEvaluaciones() { return storageGet(STORAGE_KEY) || []; }

function saveProgress() {
  storageSet(PROGRESS_KEY, {
    secIdx: state.secIdx,
    answers: state.answers,
    company: state.company,
    timestamp: Date.now()
  });
}

function clearProgress() { storageRemove(PROGRESS_KEY); }

function saveEvaluation(secs, overall, roadmap) {
  const evaluaciones = getEvaluaciones();
  const entry = {
    id: Date.now(),
    fecha: new Date().toISOString(),
    empresa: state.company.name || 'Sin nombre',
    contacto: state.company.contact || '',
    sector: state.company.sector || '',
    tamanio: state.company.size || '',
    proyectos: state.company.projects || '',
    respuestas: state.answers,
    puntajes: secs.map(s=>({ id:s.id, label:s.label, pct:s.pct, weight:s.weight, color:s.color })),
    total: overall,
    etiqueta: statusFor(overall).label,
    roadmap: roadmap.map(r=>({ name:r.name, area:r.area, hrs:r.hrs, pct:r.pct, id:r.id||'' }))
  };
  evaluaciones.unshift(entry);
  const ok = storageSet(STORAGE_KEY, evaluaciones.slice(0, 50)); // keep last 50
  clearProgress();
  return ok;
}

function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  if (!t) return;
  t.className = 'toast toast-'+type+' show';
  t.innerHTML = msg;
  setTimeout(()=>{ t.classList.remove('show'); }, 4000);
}

function updateHistLink() {
  const list = getEvaluaciones();
  const link = document.getElementById('hist-link');
  const count = document.getElementById('hist-count');
  if (!link) return;
  if (list.length > 0) {
    link.style.display = 'flex';
    count.textContent = `Historial (${list.length})`;
  } else {
    link.style.display = 'none';
  }
}

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let state = {
  phase: 'intro',
  secIdx: 0,
  answers: {},
  company: { name:'', sector:'', size:'', contact:'', projects:'' }
};

const main = document.getElementById('main');

// ═══════════════════════════════════════════════════════════════
//  INIT — check for saved progress
// ═══════════════════════════════════════════════════════════════
function init() {
  updateHistLink();
  const prog = storageGet(PROGRESS_KEY);
  if (prog && Object.keys(prog.answers||{}).length > 0) {
    state.secIdx  = prog.secIdx  || 0;
    state.answers = prog.answers || {};
    state.company = prog.company || state.company;
    // Check if it was completed
    const totalQ = SECTIONS.reduce((a,s)=>a+s.questions.length, 0);
    const answered = Object.keys(state.answers).length;
    if (answered >= totalQ) {
      state.phase = 'results';
    } else {
      state.phase = 'resume'; // new phase: ask user whether to resume
    }
  }
  render();
}

// ═══════════════════════════════════════════════════════════════
//  RENDER ROUTER
// ═══════════════════════════════════════════════════════════════
function render() {
  window.scrollTo({ top:0, behavior:'smooth' });
  if      (state.phase==='intro')   renderIntro();
  else if (state.phase==='resume')  renderResume();
  else if (state.phase==='survey')  renderSurvey();
  else                               renderResults();
}

// ═══════════════════════════════════════════════════════════════
//  INTRO
// ═══════════════════════════════════════════════════════════════
function renderIntro() {
  const totalQ = SECTIONS.reduce((a,s)=>a+s.questions.length, 0);
  const evals  = getEvaluaciones();
  main.innerHTML = `
<div class="anim">
<div class="intro-hero">
  <div class="ih-eyebrow">SinergIA · Diagnóstico de madurez digital</div>
  <h1 class="ih-title">¿Qué tan preparada está<br>su empresa para operar<br>con <em>IA en obra</em>?</h1>
  <p class="ih-body">Diagnóstico de ${totalQ} preguntas en 8 áreas clave de gestión de proyectos y construcción. Obtenga su puntaje de madurez, identifique las brechas prioritarias y reciba un roadmap personalizado de Sprints de IA.</p>
  <div class="ih-chips">
    <span class="ih-chip">${totalQ} preguntas</span>
    <span class="ih-chip">8 áreas evaluadas</span>
    <span class="ih-chip">~10 minutos</span>
    <span class="ih-chip">Roadmap personalizado</span>
    <span class="ih-chip">Resultados guardados</span>
  </div>
</div>
${evals.length>0?`<div class="resume-banner anim-2">
  <div class="rb-icon">📋</div>
  <div class="rb-text">Tiene <strong>${evals.length} diagnóstico${evals.length>1?'s':''} guardado${evals.length>1?'s':''}</strong>. Puede comparar su próximo resultado con evaluaciones anteriores.</div>
  <a href="historial.html" class="btn btn-ghost rb-btn">Ver historial →</a>
</div>`:''}
<div class="form-card anim-3">
  <div class="form-card-title">Datos de la empresa — mejoran la precisión del reporte</div>
  <div class="form-grid-2">
    <div class="field"><label>Nombre de la empresa</label><input id="fi-name" type="text" placeholder="Ej. Constructora Andina S.A."></div>
    <div class="field"><label>Su nombre</label><input id="fi-contact" type="text" placeholder="Nombre del evaluador"></div>
  </div>
  <div class="form-grid-3">
    <div class="field"><label>Sector</label>
      <select id="fi-sector"><option value="">Seleccione...</option>
        <option>Construcción residencial</option><option>Construcción comercial</option>
        <option>Infraestructura pública</option><option>Construcción industrial</option>
        <option>Desarrollo inmobiliario</option><option>Construcción mixta</option>
      </select>
    </div>
    <div class="field"><label>Tamaño del equipo</label>
      <select id="fi-size"><option value="">Seleccione...</option>
        <option>Menos de 30 empleados</option><option>30 a 100 empleados</option>
        <option>100 a 300 empleados</option><option>Más de 300 empleados</option>
      </select>
    </div>
    <div class="field"><label>Proyectos activos</label>
      <select id="fi-projects"><option value="">Seleccione...</option>
        <option>1 proyecto</option><option>2 a 4 proyectos</option>
        <option>5 a 10 proyectos</option><option>Más de 10 proyectos</option>
      </select>
    </div>
  </div>
</div>
<div style="display:flex;justify-content:flex-end" class="anim-4">
  <button class="btn btn-primary" onclick="startSurvey()" style="font-size:15px;padding:12px 28px">Iniciar diagnóstico →</button>
</div>
</div>`;
}

function startSurvey() {
  state.company.name    = document.getElementById('fi-name').value.trim() || 'Su empresa';
  state.company.contact = document.getElementById('fi-contact').value.trim() || '';
  state.company.sector  = document.getElementById('fi-sector').value  || '';
  state.company.size    = document.getElementById('fi-size').value    || '';
  state.company.projects= document.getElementById('fi-projects').value|| '';
  state.phase   = 'survey';
  state.secIdx  = 0;
  state.answers = {};
  clearProgress();
  render();
}

// ═══════════════════════════════════════════════════════════════
//  RESUME PROMPT
// ═══════════════════════════════════════════════════════════════
function renderResume() {
  const answered = Object.keys(state.answers).length;
  const totalQ   = SECTIONS.reduce((a,s)=>a+s.questions.length, 0);
  const pct      = Math.round((answered / totalQ) * 100);
  const sec      = SECTIONS[state.secIdx] || SECTIONS[0];
  main.innerHTML = `
<div class="anim">
<div class="resume-hero">
  <div class="reh-icon">🔄</div>
  <h2 class="reh-title">Tiene un diagnóstico en progreso</h2>
  <p class="reh-sub">Respondió <strong>${answered} de ${totalQ} preguntas</strong> (${pct}%) — quedó en la sección <strong>"${sec.title}"</strong>.</p>
  <div class="reh-bar-track"><div class="reh-bar-fill" style="width:${pct}%"></div></div>
  <div class="reh-btns">
    <button class="btn btn-primary" onclick="resumeSurvey()">Continuar donde lo dejé →</button>
    <button class="btn btn-ghost" onclick="discardAndStart()">Empezar de nuevo</button>
  </div>
</div>
</div>`;
}

function resumeSurvey() {
  state.phase = 'survey';
  render();
}

function discardAndStart() {
  state = { phase:'intro', secIdx:0, answers:{}, company:{name:'',sector:'',size:'',contact:'',projects:''} };
  clearProgress();
  render();
}

// ═══════════════════════════════════════════════════════════════
//  SURVEY
// ═══════════════════════════════════════════════════════════════
function renderSurvey() {
  const sec    = SECTIONS[state.secIdx];
  const totalQ = SECTIONS.reduce((a,s)=>a+s.questions.length, 0);
  const doneQ  = SECTIONS.slice(0, state.secIdx).reduce((a,s)=>a+s.questions.length, 0)
               + sec.questions.filter((_,qi)=>state.answers[`${state.secIdx}_${qi}`]!==undefined).length;
  const pct    = Math.round((doneQ / totalQ) * 100);
  const allDone= sec.questions.every((_,qi)=>state.answers[`${state.secIdx}_${qi}`]!==undefined);
  const isLast = state.secIdx === SECTIONS.length - 1;

  const qHtml = sec.questions.map((q,qi)=>{
    const sel  = state.answers[`${state.secIdx}_${qi}`];
    const gIdx = SECTIONS.slice(0,state.secIdx).reduce((a,s)=>a+s.questions.length, 0) + qi + 1;
    const optsHtml = q.opts.map((o,oi)=>`
      <div class="opt ${sel===oi+1?'sel':''}" onclick="pick(${state.secIdx},${qi},${oi+1})">
        <span class="opt-badge">${oi+1}</span><span>${o}</span>
      </div>`).join('');
    return `<div class="q-card" id="qc-${state.secIdx}-${qi}">
      <div class="q-tag">Pregunta ${gIdx} de ${totalQ}</div>
      <p class="q-text">${q.text}</p>
      <div class="opts">${optsHtml}</div>
    </div>`;
  }).join('');

  main.innerHTML = `
<div class="anim">
<div class="prog-wrap">
  <div class="prog-meta"><span>${pct}% completado</span><span>${doneQ} de ${totalQ} respondidas</span></div>
  <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
</div>
<div class="sec-header">
  <span class="sec-pill" style="background:${sec.pillBg};color:${sec.pillColor}">${sec.pill}</span>
  <h2 class="sec-title">${sec.title}</h2>
  <p class="sec-sub">${sec.sub}</p>
</div>
${qHtml}
<div class="q-nav">
  <div class="nav-progress">
    <strong>${sec.questions.filter((_,qi)=>state.answers[`${state.secIdx}_${qi}`]!==undefined).length}</strong> de <strong>${sec.questions.length}</strong> respondidas en esta sección
  </div>
  <div class="nav-btns">
    ${state.secIdx>0?`<button class="btn btn-ghost" onclick="prevSec()">← Anterior</button>`:''}
    <button class="btn btn-primary" onclick="${isLast?'finish()':'nextSec()'}" ${allDone?'':'disabled'}>
      ${isLast?'Ver mi diagnóstico →':'Siguiente →'}
    </button>
  </div>
</div>
</div>`;
}

function pick(si, qi, score) {
  state.answers[`${si}_${qi}`] = score;
  saveProgress(); // persist after each answer
  renderSurvey();
  const sec  = SECTIONS[si];
  const next = sec.questions.findIndex((_,i)=>state.answers[`${si}_${i}`]===undefined);
  if (next !== -1) setTimeout(()=>{
    const el = document.getElementById(`qc-${si}-${next}`);
    if (el) el.scrollIntoView({ behavior:'smooth', block:'center' });
  }, 100);
}

function nextSec() {
  if (!SECTIONS[state.secIdx].questions.every((_,qi)=>state.answers[`${state.secIdx}_${qi}`]!==undefined)) return;
  state.secIdx++;
  saveProgress();
  render();
}

function prevSec() {
  if (state.secIdx > 0) { state.secIdx--; saveProgress(); render(); }
}

function finish() {
  if (!SECTIONS[state.secIdx].questions.every((_,qi)=>state.answers[`${state.secIdx}_${qi}`]!==undefined)) return;
  state.phase = 'results';
  render();
}

// ═══════════════════════════════════════════════════════════════
//  SCORING
// ═══════════════════════════════════════════════════════════════
function calcScores() {
  return SECTIONS.map((sec,si)=>{
    const scores = sec.questions.map((_,qi)=>state.answers[`${si}_${qi}`]||1);
    const raw    = scores.reduce((a,b)=>a+b, 0);
    const max    = sec.questions.length * 4;
    const pct    = Math.round((raw/max)*100);
    const weakItems = sec.questions
      .map((q,qi)=>({ q, score:state.answers[`${si}_${qi}`]||1 }))
      .filter(x=>x.score<=2).map(x=>x.q.text);
    return { ...sec, raw, max, pct, weakItems };
  });
}

function overallScore(secs) {
  return Math.round(secs.reduce((a,s)=>a+(s.pct*s.weight/100), 0));
}

function statusFor(pct) {
  if (pct<35) return { label:'Crítico',       color:'#DC2626', bg:'#FEE2E2', ring:'#FCA5A5' };
  if (pct<55) return { label:'Deficiente',    color:'#D97706', bg:'#FEF3C7', ring:'#FCD34D' };
  if (pct<70) return { label:'En desarrollo', color:'#0D9488', bg:'#CCFBF1', ring:'#5EEAD4' };
  if (pct<85) return { label:'Maduro',        color:'#1E40AF', bg:'#DBEAFE', ring:'#93C5FD' };
  return             { label:'Optimizado',    color:'#064E3B', bg:'#D1FAE5', ring:'#6EE7B7' };
}

function priorityReason(sec) {
  const reasons = {
    costos:      ['Sin control de costos por rubro, los sobrecostos se descubren cuando el daño ya ocurrió.','El control existe pero la demora en los datos hace que las alertas lleguen tarde para actuar.','El sistema funciona pero hay brechas en automatización del cálculo EVM y las alertas de CPI.','Buena base — agregar alertas automáticas de CPI y EAC potencia el control que ya existe.'],
    cronograma:  ['Sin CPM activo, el proyecto navega sin mapa — los retrasos se acumulan invisiblemente.','El cronograma existe pero sin camino crítico actualizado ni baselines no hay control real.','CPM funcional pero la gestión de baselines múltiples y la detección temprana pueden mejorarse.','Cronograma maduro — agregar análisis de float paths y detección predictiva de retrasos con IA.'],
    lean:        ['Sin Last Planner ni PPC, la planificación semanal es una promesa sin medición ni mejora.','Se planifica pero sin metodología Lean el equipo no puede mejorar su tasa de cumplimiento.','LPS parcial — digitalizar los tableros y automatizar el PPC multiplica el impacto del método.','LPS maduro — integrar IA en el análisis de causas raíz y el lookahead predictivo da el siguiente salto.'],
    riesgos:     ['Sin registro de riesgos, los proyectos absorben impactos que eran previsibles y mitigables.','Los riesgos se identifican pero sin cuantificación no hay forma de priorizar ni presupuestar contingencias.','Análisis cualitativo establecido — agregar cuantificación probabilística da el rango que el directorio necesita.','Gestión de riesgos madura — integrar los planes de respuesta al cronograma CPM es el paso siguiente.'],
    recursos:    ['Sin visibilidad de recursos entre proyectos, la sobrecarga pasa desapercibida hasta que hay crisis.','Planificación básica pero sin histogramas ni nivelación los cuellos de botella son inevitables.','Control de recursos funcional — la nivelación multi-proyecto y los histogramas automáticos eliminan los picos.','Gestión de recursos sólida — la planificación de capacidad a largo plazo es el siguiente nivel.'],
    portafolio:  ['El directorio toma decisiones con información incompleta o con semanas de retraso sistemático.','Los datos existen pero sin dashboard consolidado cada decisión requiere trabajo manual de consolidación.','Visibilidad parcial — automatizar el portafolio y los reportes elimina el trabajo de preparación semanal.','Portafolio bien instrumentado — los análisis what-if y la priorización estratégica son el próximo paso.'],
    comunicacion:['Sin actas estructuradas los compromisos se pierden y los mismos errores se repiten en cada obra.','Comunicación informal que genera trazabilidad cero — cualquier conflicto futuro es difícil de resolver.','Proceso de actas establecido pero manual — automatizarlo con IA libera horas del equipo técnico senior.','Comunicación bien gestionada — la sincronización campo-oficina en tiempo real es el paso que falta.'],
    herramientas:['La baja adopción digital limita el impacto de cualquier mejora de proceso que se implemente.','Herramientas básicas sin integración — los datos están aislados y los procesos siguen siendo manuales.','Base digital razonable — integrar la app de campo y habilitar multi-usuario son las mejoras clave.','Equipo digital maduro — la app móvil offline y la colaboración simultánea generarán impacto inmediato.'],
  };
  const idx = sec.pct<35?0:sec.pct<55?1:sec.pct<70?2:3;
  return (reasons[sec.id]||['Área con oportunidad de mejora identificada.'])[idx];
}

// ═══════════════════════════════════════════════════════════════
//  RESULTS
// ═══════════════════════════════════════════════════════════════
function renderResults() {
  const secs    = calcScores();
  const overall = overallScore(secs);
  const ol      = statusFor(overall);
  const sorted  = [...secs].sort((a,b)=>a.pct-b.pct);

  const roadmap = sorted.slice(0,4).map((s,i)=>{
    const sp = SPRINT_MAP[s.id] || SPRINT_MAP.costos;
    return { ...sp, id:s.id, pct:s.pct, weeks:`Semanas ${i*3+1}–${i*3+3}`, status:statusFor(s.pct) };
  });

  const totalMaxHrs = roadmap.reduce((a,rm)=>{ const n=parseInt(rm.hrs.split('–')[1])||10; return a+n; }, 0);
  const valueUSD    = Math.round(totalMaxHrs*28*52/1000)*1000;
  const critN       = secs.filter(s=>s.pct<35).length;
  const defN        = secs.filter(s=>s.pct>=35&&s.pct<55).length;
  const summary     = `${state.company.name} obtiene un puntaje de ${overall}/100 — nivel ${ol.label.toLowerCase()}. ${critN>0?`${critN} área${critN>1?'s están':'está'} en estado crítico.`:''} ${defN>0?`${defN} área${defN>1?'s requieren':'requiere'} mejora prioritaria.`:''}`;

  // AUTO-SAVE
  const saved = saveEvaluation(secs, overall, roadmap);
  updateHistLink();

  main.innerHTML = `
<div class="anim">
<!-- SAVED BANNER -->
${saved?`<div class="saved-banner"><span>✓ Evaluación guardada automáticamente</span><a href="historial.html" class="sb-link">Ver historial →</a></div>`:`<div class="saved-banner saved-warn"><span>⚠ No se pudo guardar (almacenamiento no disponible)</span></div>`}

<!-- HERO -->
<div class="result-hero">
  <div>
    <div class="rh-eyebrow">Diagnóstico de madurez · Área de Proyectos · ${new Date().toLocaleDateString('es-EC')}</div>
    <div class="rh-company">${state.company.name}</div>
    <div class="rh-meta">${[state.company.sector,state.company.size,state.company.projects].filter(Boolean).join(' · ')}${state.company.contact?' · '+state.company.contact:''}</div>
    <p class="rh-summary">${summary}</p>
  </div>
  <div class="score-ring" style="border-color:${ol.ring}60">
    <div class="sr-num" style="color:${ol.ring}">${overall}</div>
    <div class="sr-den">/ 100</div>
    <div class="sr-label" style="color:${ol.ring}">${ol.label}</div>
  </div>
</div>

<!-- SCORES -->
<div class="sec-scores" id="scores-a"></div>
<div class="sec-scores-2" id="scores-b"></div>

<!-- PRIORITY TABLE -->
<div class="table-card anim-2">
  <div class="table-head">Áreas ordenadas por prioridad de intervención</div>
  ${sorted.map((s,i)=>{
    const st=statusFor(s.pct);
    return `<div class="p-row">
      <div class="p-num" style="background:${st.bg};color:${st.color}">${i+1}</div>
      <div class="p-info">
        <div class="p-name">${s.label}</div>
        <div class="p-why">${priorityReason(s)}</div>
      </div>
      <div class="p-status">
        <span class="status-badge" style="background:${st.bg};color:${st.color}">${st.label}</span>
        <span class="p-pct" style="color:${st.color}">${s.pct}%</span>
      </div>
    </div>`;
  }).join('')}
</div>

<!-- ROADMAP -->
<div class="roadmap-section anim-3">
  <div class="roadmap-title">Roadmap recomendado de Sprints SinergIA</div>
  <div class="roadmap-sub">Los 4 Sprints con mayor impacto para su diagnóstico, en secuencia óptima</div>
  <div class="roadmap-grid">
    ${roadmap.map((rm,i)=>`
    <div class="rm-card ${i===0?'first':''}">
      <div class="rm-when">${rm.weeks}</div>
      <div class="rm-sprint">${rm.name}</div>
      <div class="rm-area">${rm.area}</div>
      <span class="rm-hrs">${rm.hrs} recuperadas</span>
      <div class="rm-score">Madurez actual: ${rm.pct}% · ${rm.status.label}</div>
    </div>`).join('')}
  </div>
</div>

<!-- ROI BOX -->
<div class="roi-box anim-4">
  <div class="roi-item">
    <div class="roi-num">~${totalMaxHrs}</div>
    <div class="roi-label">Horas semanales máx. recuperadas al completar los 4 Sprints prioritarios</div>
  </div>
  <div class="roi-item">
    <div class="roi-num">$${(valueUSD/1000).toFixed(0)}K</div>
    <div class="roi-label">USD de valor anual estimado liberado (costo promedio $28/hora)</div>
  </div>
  <div class="roi-item">
    <div class="roi-num">3 sem</div>
    <div class="roi-label">Para tener el primer Sprint funcionando con garantía total de devolución</div>
  </div>
</div>

<!-- INSIGHTS -->
<div class="insights anim-4">${buildInsights(secs,overall,sorted)}</div>

<!-- DETAIL CARDS -->
<div class="detail-section">
  <div class="detail-title">Procesos específicos con brechas detectadas</div>
  <div class="detail-grid">${buildDetailCards(sorted)}</div>
</div>

<!-- CTA -->
<div class="cta-row">
  <button class="btn btn-primary" onclick="window.print()">Imprimir / Guardar PDF</button>
  <button class="btn btn-orange" onclick="restart()">Nuevo diagnóstico →</button>
  <a href="historial.html" class="btn btn-violet">Ver historial →</a>
  <button class="btn btn-ghost" onclick="copyReport()">Copiar resumen</button>
</div>
</div>`;

  // Animate score bars
  setTimeout(()=>{
    ['scores-a','scores-b'].forEach((id,ri)=>{
      const grid = document.getElementById(id);
      if (!grid) return;
      const arr = ri===0 ? secs.slice(0,4) : secs.slice(4,8);
      grid.innerHTML = arr.map(s=>{
        const st = statusFor(s.pct);
        return `<div class="ss-card">
          <div class="ss-name">${s.label}</div>
          <div class="ss-pct" style="color:${st.color}">${s.pct}%</div>
          <div class="ss-bar"><div class="ss-bar-fill" style="width:0%;background:${s.color}" data-w="${s.pct}"></div></div>
          <div class="ss-status" style="color:${st.color}">${st.label} · ${s.weight}%</div>
        </div>`;
      }).join('');
    });
    setTimeout(()=>{ document.querySelectorAll('.ss-bar-fill').forEach(el=>{ el.style.width=el.dataset.w+'%'; }); }, 60);
  }, 60);
}

function buildInsights(secs, overall, sorted) {
  let html = '';
  const critical  = secs.filter(s=>s.pct<35);
  const deficient = secs.filter(s=>s.pct>=35&&s.pct<55);
  const newAreas  = secs.filter(s=>['lean','riesgos','recursos'].includes(s.id)&&s.pct<55);
  const good      = secs.filter(s=>s.pct>=75);

  if (critical.length>0)
    html+=`<div class="ins-card ins-critical"><div class="ins-label">Alerta crítica — acción inmediata requerida</div>
      <div class="ins-text"><strong>${critical.map(s=>s.label).join(' y ')}</strong> ${critical.length>1?'están':'está'} en estado crítico. Son puntos ciegos operativos donde las pérdidas ocurren sin visibilidad. Un Sprint de 3 semanas puede transformar cada área de cero control a alertas automáticas funcionando.</div></div>`;

  if (deficient.length>0)
    html+=`<div class="ins-card ins-warn"><div class="ins-label">Procesos manuales con alto costo de fricción</div>
      <div class="ins-text"><strong>${deficient.map(s=>s.label).join(' y ')}</strong> tienen procesos que existen pero consumen tiempo valioso del equipo técnico. La IA no reemplaza el criterio del equipo — elimina el trabajo repetitivo que les impide aplicarlo.</div></div>`;

  if (newAreas.length>0)
    html+=`<div class="ins-card ins-info"><div class="ins-label">Capacidades estratégicas con bajo nivel de implementación</div>
      <div class="ins-text"><strong>${newAreas.map(s=>s.label).join(', ')}</strong> son áreas que las constructoras líderes de LATAM ya tienen implementadas como estándar operativo. Implementarlas eleva el nivel de madurez al estándar internacional de la industria.</div></div>`;

  if (overall>=55&&overall<75)
    html+=`<div class="ins-card ins-ok"><div class="ins-label">Empresa en transición — momento óptimo para IA</div>
      <div class="ins-text">Superó la etapa de solo Excel y WhatsApp. Este es el momento exacto para agregar IA: los procesos ya existen, los datos ya fluyen, y la IA los potencia sin rediseñar desde cero.</div></div>`;

  if (good.length>0)
    html+=`<div class="ins-card ins-ok"><div class="ins-label">Fortalezas identificadas — base para escalar</div>
      <div class="ins-text"><strong>${good.map(s=>s.label).join(' y ')}</strong> muestran madurez alta. En estas áreas el Sprint agrega inteligencia sobre procesos que ya funcionan.</div></div>`;

  html+=`<div class="ins-card ins-info"><div class="ins-label">Potencial total identificado en este diagnóstico</div>
    <div class="ins-text">Con los Sprints prioritarios, el equipo puede recuperar entre <strong>30 y 60 horas semanales</strong>. Mientras el mercado LATAM opera debajo del 40% de madurez digital, las empresas que adoptan IA en los próximos 18 meses definen el nuevo piso competitivo del sector.</div></div>`;

  return html;
}

function buildDetailCards(sorted) {
  return sorted.slice(0,4).map(s=>{
    if (!s.weakItems||!s.weakItems.length) return '';
    const st = statusFor(s.pct);
    return `<div class="detail-card">
      <div class="dc-area" style="color:${st.color}">${s.label} · ${s.pct}% — ${st.label}</div>
      <ul class="dc-issues">${s.weakItems.slice(0,3).map(q=>`<li class="dc-issue">
        <span class="dc-dot" style="background:${st.color}"></span><span>${q}</span></li>`).join('')}</ul>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════════════
function restart() {
  state = { phase:'intro', secIdx:0, answers:{}, company:{name:'',sector:'',size:'',contact:'',projects:''} };
  clearProgress();
  render();
}

function copyReport() {
  const secs    = calcScores();
  const overall = overallScore(secs);
  const ol      = statusFor(overall);
  const sorted  = [...secs].sort((a,b)=>a.pct-b.pct);
  let t = `DIAGNÓSTICO ÁREA DE PROYECTOS — ${state.company.name}\n`;
  t += `Fecha: ${new Date().toLocaleDateString('es-EC')} | Puntaje: ${overall}/100 — ${ol.label}\n\n`;
  t += `RESULTADOS POR ÁREA:\n`;
  secs.forEach(s=>{ t+=`· ${s.label}: ${s.pct}% — ${statusFor(s.pct).label}\n`; });
  t += `\nROADMAP RECOMENDADO (top 4):\n`;
  sorted.slice(0,4).forEach((s,i)=>{
    const sp = SPRINT_MAP[s.id];
    t += `${i+1}. ${sp.name} — Semanas ${i*3+1}-${i*3+3}\n`;
  });
  t += `\nGenerado por SinergIA by Human+AI · 2026`;
  navigator.clipboard.writeText(t)
    .then(()=>showToast('✓ Resumen copiado al portapapeles', 'ok'))
    .catch(()=>alert('Seleccione el contenido manualmente con Ctrl+A.'));
}

// START
init();
</script>
</body>
</html>
