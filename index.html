<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SinergIA · Diagnóstico de Madurez</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --g:#064E3B;--gm:#059669;--gl:#A7F3D0;--gxl:#D1FAE5;
  --v:#4C1D95;--vm:#7C3AED;--vl:#DDD6FE;
  --o:#F97316;--ol:#FFEDD5;
  --a:#D97706;--al:#FEF3C7;
  --r:#DC2626;--rl:#FEE2E2;
  --b:#1E40AF;--bl:#DBEAFE;
  --t:#0D9488;--tl:#CCFBF1;
  --sl:#475569;--slat:#F1F5F9;
  --ink:#0F172A;--mist:#64748B;--fog:#CBD5E1;
  --wh:#FFFFFF;--paper:#F8FAFC;--card:#FFFFFF;
  --rm:10px;--rl:16px;--rxl:24px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased}
.shell{min-height:100vh;display:flex;flex-direction:column}
/* TOPBAR */
.topbar{background:var(--g);padding:13px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-brand{font-family:'DM Serif Display',Georgia,serif;font-size:21px;color:#fff;letter-spacing:-.02em}
.tb-brand span{color:#6EE7B7}
.tb-right{display:flex;align-items:center;gap:14px}
.tb-sub{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:.05em}
.tb-hist{display:none;align-items:center;gap:5px;font-size:12px;color:#6EE7B7;text-decoration:none;padding:5px 12px;border:1px solid rgba(110,231,183,.3);border-radius:100px;transition:all .2s}
.tb-hist:hover{background:rgba(110,231,183,.1)}
/* MAIN */
.main{flex:1;max-width:880px;margin:0 auto;padding:36px 22px 56px;width:100%}
/* FOOTER */
.footer{padding:18px 28px;border-top:1px solid var(--fog);display:flex;justify-content:space-between;font-size:12px;color:var(--mist);flex-shrink:0}
.footer strong{color:var(--g)}
/* PROGRESS */
.prog{margin-bottom:24px}
.prog-top{display:flex;justify-content:space-between;font-size:12px;color:var(--mist);margin-bottom:7px}
.prog-track{height:5px;background:var(--fog);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gm),#34D399);border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
/* HERO */
.hero{background:var(--g);border-radius:var(--rxl);padding:44px;margin-bottom:24px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-60px;right:-60px;width:280px;height:280px;background:radial-gradient(circle,rgba(52,211,153,.14),transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-40px;left:-40px;width:190px;height:190px;background:radial-gradient(circle,rgba(249,115,22,.09),transparent 70%);pointer-events:none}
.h-eye{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#6EE7B7;font-weight:500;margin-bottom:14px}
.h-title{font-family:'DM Serif Display',Georgia,serif;font-size:clamp(24px,4vw,40px);color:#fff;line-height:1.15;margin-bottom:14px}
.h-title em{color:#6EE7B7;font-style:italic}
.h-body{font-size:15px;color:rgba(255,255,255,.63);max-width:560px;line-height:1.6;margin-bottom:22px}
.h-chips{display:flex;gap:7px;flex-wrap:wrap}
.h-chip{font-size:11px;padding:4px 11px;border-radius:100px;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5)}
/* RESUME BANNER */
.rb-banner{background:#fff;border:1px solid var(--gl);border-left:4px solid var(--gm);border-radius:var(--rl);padding:13px 16px;margin-bottom:18px;display:flex;align-items:center;gap:11px;flex-wrap:wrap}
.rb-text{font-size:14px;color:var(--ink);flex:1;min-width:160px}
/* FORM */
.form-card{background:var(--card);border:1px solid var(--fog);border-radius:var(--rxl);padding:28px;margin-bottom:24px}
.fc-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:18px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
.field label{font-size:12px;color:var(--mist);display:block;margin-bottom:5px;font-weight:500}
.field input,.field select{width:100%;height:40px;padding:0 12px;border:1px solid var(--fog);border-radius:var(--rm);font-size:13px;font-family:inherit;color:var(--ink);background:var(--paper);outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--gm);background:#fff}
/* RESUME HERO */
.reh{background:#fff;border:1px solid var(--fog);border-radius:var(--rxl);padding:38px;text-align:center;max-width:540px;margin:36px auto}
.reh-icon{font-size:40px;margin-bottom:14px}
.reh-title{font-family:'DM Serif Display',Georgia,serif;font-size:26px;color:var(--ink);margin-bottom:9px}
.reh-sub{font-size:14px;color:var(--mist);line-height:1.5;margin-bottom:18px}
.reh-bar{height:7px;background:var(--fog);border-radius:4px;overflow:hidden;margin:0 auto 26px;max-width:380px}
.reh-bar-fill{height:100%;background:linear-gradient(90deg,var(--gm),#34D399);border-radius:4px}
.reh-btns{display:flex;gap:11px;justify-content:center;flex-wrap:wrap}
/* SECTION HEADER */
.sec-head{margin-bottom:22px}
.sec-pill{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:4px 11px;border-radius:100px;margin-bottom:9px}
.sec-title{font-family:'DM Serif Display',Georgia,serif;font-size:25px;color:var(--ink);margin-bottom:5px}
.sec-sub{font-size:14px;color:var(--mist);line-height:1.5;max-width:660px}
/* QUESTIONS */
.q-card{background:var(--card);border:1px solid var(--fog);border-radius:var(--rxl);padding:22px;margin-bottom:13px}
.q-tag{font-size:11px;color:var(--mist);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.q-text{font-size:15px;font-weight:500;color:var(--ink);margin-bottom:14px;line-height:1.4}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.opt{padding:10px 13px;border:1.5px solid var(--fog);border-radius:var(--rm);cursor:pointer;font-size:13px;color:var(--sl);line-height:1.35;transition:all .15s;display:flex;gap:8px;align-items:flex-start;background:var(--paper);user-select:none}
.opt:hover{border-color:var(--gm);background:#fff;color:var(--ink)}
.opt.sel{border-color:var(--g);background:var(--gxl);color:var(--g);font-weight:500}
.opt-b{flex-shrink:0;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.06);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;color:var(--mist);margin-top:1px}
.opt.sel .opt-b{background:var(--g);color:#fff}
/* NAV */
.q-nav{display:flex;justify-content:space-between;align-items:center;padding:18px 0 0;border-top:1px solid var(--fog);margin-top:6px}
.nav-prog{font-size:13px;color:var(--mist)}
.nav-prog strong{color:var(--ink)}
.nav-btns{display:flex;gap:9px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:var(--rm);font-size:14px;font-family:inherit;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all .15s;text-decoration:none;white-space:nowrap;line-height:1}
.btn-primary{background:var(--g);color:#fff;border-color:var(--g)}
.btn-primary:hover{background:#065F46}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--sl);border-color:var(--fog)}
.btn-ghost:hover{border-color:var(--sl);color:var(--ink)}
.btn-orange{background:var(--o);color:#fff;border-color:var(--o)}
.btn-orange:hover{background:#EA6A0A}
.btn-violet{background:var(--v);color:#fff;border-color:var(--v)}
.btn-violet:hover{background:#3B1578}
/* SAVED BANNER */
.sav-banner{background:var(--gxl);border:1px solid var(--gl);border-radius:var(--rl);padding:11px 16px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;font-size:14px;color:var(--g)}
.sav-warn{background:var(--al);border-color:#FCD34D;color:var(--a)}
.sav-link{color:var(--g);font-weight:600;text-decoration:none;cursor:pointer;background:none;border:none;font-size:14px;font-family:inherit}
.sav-link:hover{text-decoration:underline}
/* RESULT HERO */
.res-hero{background:var(--g);border-radius:var(--rxl);padding:34px 38px;margin-bottom:18px;display:grid;grid-template-columns:1fr 112px;gap:22px;align-items:center;position:relative;overflow:hidden}
.res-hero::before{content:'';position:absolute;top:-70px;right:70px;width:260px;height:260px;background:radial-gradient(circle,rgba(52,211,153,.11),transparent 70%);pointer-events:none}
.rh-eye{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#6EE7B7;margin-bottom:5px}
.rh-co{font-family:'DM Serif Display',Georgia,serif;font-size:27px;color:#fff;margin-bottom:3px}
.rh-meta{font-size:13px;color:rgba(255,255,255,.48);margin-bottom:14px}
.rh-sum{font-size:14px;color:rgba(255,255,255,.68);line-height:1.5;max-width:520px}
.score-ring{width:108px;height:108px;border-radius:50%;border:3px solid rgba(255,255,255,.15);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;z-index:1;flex-shrink:0}
.sr-n{font-family:'DM Serif Display',Georgia,serif;font-size:34px;color:#fff;line-height:1}
.sr-d{font-size:12px;color:rgba(255,255,255,.38);margin-top:2px}
.sr-l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-top:3px}
/* SCORES GRID */
.sg,.sg2{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:13px}
.sc{background:var(--card);border:1px solid var(--fog);border-radius:var(--rl);padding:13px 11px}
.sc-n{font-size:12px;font-weight:500;color:var(--ink);margin-bottom:5px;line-height:1.3}
.sc-p{font-size:21px;font-weight:600;line-height:1;margin-bottom:5px}
.sc-bar{height:3px;background:var(--fog);border-radius:2px;overflow:hidden;margin-bottom:5px}
.sc-bf{height:100%;border-radius:2px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.sc-s{font-size:10px;font-weight:500}
/* TABLE */
.tbl-card{background:var(--card);border:1px solid var(--fog);border-radius:var(--rxl);overflow:hidden;margin-bottom:22px}
.tbl-h{padding:13px 18px;background:var(--slat);border-bottom:1px solid var(--fog);font-size:11px;font-weight:600;color:var(--mist);text-transform:uppercase;letter-spacing:.1em}
.p-row{display:grid;grid-template-columns:34px 1fr 170px;gap:13px;align-items:center;padding:13px 18px;border-bottom:1px solid var(--fog)}
.p-row:last-child{border-bottom:none}
.p-num{width:27px;height:27px;border-radius:50%;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.p-nm{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:2px}
.p-why{font-size:12px;color:var(--mist);line-height:1.4}
.p-stat{text-align:right}
.sbadge{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:100px}
.p-pct{font-size:12px;font-weight:500;display:block;margin-top:3px}
/* ROADMAP */
.rm-sec{margin-bottom:22px}
.rm-title{font-family:'DM Serif Display',Georgia,serif;font-size:21px;color:var(--ink);margin-bottom:5px}
.rm-sub{font-size:13px;color:var(--mist);margin-bottom:14px}
.rm-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.rm-card{background:var(--card);border:1px solid var(--fog);border-radius:var(--rl);padding:15px 13px;position:relative}
.rm-card.first{border-color:var(--g);border-width:2px}
.rm-card.first::before{content:'Empezar aquí';position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:var(--g);color:#fff;font-size:10px;font-weight:600;padding:2px 9px;border-radius:100px;white-space:nowrap}
.rm-when{font-size:10px;color:var(--mist);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.rm-card.first .rm-when{color:var(--gm);font-weight:600}
.rm-sprint{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:3px;line-height:1.3}
.rm-card.first .rm-sprint{color:var(--g)}
.rm-area{font-size:11px;color:var(--mist);margin-bottom:7px;line-height:1.3}
.rm-hrs{font-size:11px;font-weight:600;color:var(--g);background:var(--gxl);padding:3px 7px;border-radius:4px;display:inline-block}
.rm-score{font-size:11px;color:var(--mist);margin-top:4px}
/* ROI BOX */
.roi{background:var(--v);border-radius:var(--rxl);padding:28px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:22px}
.roi-it{text-align:center}
.roi-n{font-family:'DM Serif Display',Georgia,serif;font-size:34px;color:#fff;line-height:1;margin-bottom:5px}
.roi-l{font-size:12px;color:rgba(255,255,255,.55);line-height:1.4}
/* INSIGHTS */
.ins-wrap{margin-bottom:22px;display:flex;flex-direction:column;gap:9px}
.ins{border-radius:var(--rl);padding:15px 18px;border-left:4px solid}
.ins-l{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.ins-t{font-size:13px;line-height:1.5}
.ins-crit{background:var(--rl);border-color:var(--r)}.ins-crit .ins-l{color:var(--r)}.ins-crit .ins-t{color:#7F1D1D}
.ins-warn{background:var(--al);border-color:var(--a)}.ins-warn .ins-l{color:var(--a)}.ins-warn .ins-t{color:#78350F}
.ins-ok{background:var(--gxl);border-color:var(--gm)}.ins-ok .ins-l{color:var(--g)}.ins-ok .ins-t{color:#064E3B}
.ins-inf{background:var(--bl);border-color:var(--b)}.ins-inf .ins-l{color:var(--b)}.ins-inf .ins-t{color:#1E3A8A}
/* DETAIL */
.det-sec{margin-bottom:22px}
.det-title{font-family:'DM Serif Display',Georgia,serif;font-size:19px;color:var(--ink);margin-bottom:11px}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.det-card{background:var(--card);border:1px solid var(--fog);border-radius:var(--rl);padding:15px 16px}
.dc-a{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px}
.dc-issues{list-style:none}
.dc-issue{font-size:13px;color:var(--sl);padding:4px 0;border-bottom:1px solid var(--fog);line-height:1.35;display:flex;gap:7px;align-items:flex-start}
.dc-issue:last-child{border-bottom:none}
.dc-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px}
/* CTA ROW */
.cta-row{display:flex;gap:9px;flex-wrap:wrap;padding-top:14px;border-top:1px solid var(--fog)}
/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--g);color:#fff;padding:11px 22px;border-radius:100px;font-size:14px;font-weight:500;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* ANIM */
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fu .35s ease both}
.a2{animation:fu .35s .07s ease both}
.a3{animation:fu .35s .14s ease both}
.a4{animation:fu .35s .21s ease both}
/* PRINT */
@media print{
  .topbar,.footer,.cta-row,.toast,.sav-banner,.prog,.nav-btns{display:none!important}
  .res-hero,.roi{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body{background:#fff}
}
/* RESPONSIVE */
@media(max-width:700px){
  .fg2,.fg3,.opts,.sg,.sg2,.rm-grid,.det-grid{grid-template-columns:1fr}
  .p-row{grid-template-columns:34px 1fr}.p-stat{display:none}
  .res-hero{grid-template-columns:1fr}.score-ring{display:none}
  .roi{grid-template-columns:1fr;gap:12px}
  .main{padding:22px 14px 44px}
  .hero{padding:28px}
  .topbar{padding:11px 14px}
}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="tb-brand">Sinerg<span>IA</span></div>
    <div class="tb-right">
      <span class="tb-sub">Diagnóstico · Madurez Digital</span>
      <a class="tb-hist" id="hist-lnk" href="historial.html">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm.75 10.25h-1.5V7h1.5v4.25zm0-5.5h-1.5V4.25h1.5V5.75z"/></svg>
        <span id="hist-cnt">Historial</span>
      </a>
    </div>
  </header>
  <main class="main" id="main"></main>
  <footer class="footer">
    <div><strong>SinergIA</strong> by Human+AI · IA que multiplica, no reemplaza · 2026</div>
    <div>Los resultados se guardan localmente en su navegador</div>
  </footer>
</div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════
// DATOS
// ═══════════════════════════
const SECTIONS=[
  {id:'costos',label:'Control de costos',weight:18,color:'#4C1D95',pillBg:'#EDE9FE',pillColor:'#3C3489',pill:'Sección 1 de 8 · 18% del diagnóstico',title:'Control de costos y presupuesto de obra',sub:'Cómo comparan el costo real contra el presupuesto aprobado y calculan indicadores de valor ganado durante la ejecución.',questions:[
    {text:'¿Cómo llevan el control del costo real versus el presupuesto por rubro de obra?',opts:['No lo llevamos activamente — solo vemos el total cuando el proyecto termina','Excel manual que alguien actualiza cada semana o quincena con los datos que llegan','Sistema que existe pero los datos del campo llegan con uno o dos semanas de retraso','Sistema actualizado en tiempo real directamente desde el campo sin intermediarios']},
    {text:'¿Cuándo se enteran de que un rubro específico está superando el presupuesto?',opts:['Cuando ya se gastó todo o cuando hay una deuda impaga con el proveedor','En la reunión mensual cuando el contador cierra el mes y presenta los números','Semanalmente al revisar la planilla de costos, pero el proceso toma varias horas','Recibimos una alerta automática antes de que el sobrecosto supere el umbral definido']},
    {text:'¿Calculan indicadores de Valor Ganado — CPI, SPI, EAC — en sus proyectos activos?',opts:['No conocemos esa metodología — nunca la hemos aplicado en nuestra empresa','La conocemos pero no la calculamos porque toma demasiado tiempo manualmente','La calculamos para algunos proyectos o solo en ciertos meses del año','Se calcula automáticamente para todos los proyectos y está visible en el dashboard']},
    {text:'¿Tienen visibilidad del costo final estimado (EAC) del proyecto mientras está en ejecución?',opts:['Solo cuando el proyecto está casi terminado o al cierre definitivo','Hacemos una estimación informal de vez en cuando, sin metodología consistente','Lo calculamos manualmente cada mes con los datos del sistema existente','El sistema lo actualiza automáticamente con cada reporte de avance del campo']},
    {text:'¿Cómo controlan las órdenes de cambio y su impacto acumulado en el presupuesto total?',opts:['No se documentan formalmente — se acuerdan verbalmente o por WhatsApp','Se registran en Excel pero no siempre se actualizan a tiempo ni se consolidan','Proceso manual con formulario establecido, pero lento y con retrasos frecuentes','Proceso digital con aprobación formalizada y actualización automática del presupuesto']},
  ]},
  {id:'cronograma',label:'Control de cronograma',weight:18,color:'#064E3B',pillBg:'#D1FAE5',pillColor:'#065F46',pill:'Sección 2 de 8 · 18% del diagnóstico',title:'Control de cronograma CPM y avance de obra',sub:'Cómo gestionan el cronograma base, calculan el camino crítico, manejan baselines múltiples y comparan el avance real contra el plan.',questions:[
    {text:'¿Cómo gestionan el cronograma base CPM aprobado del proyecto durante la ejecución?',opts:['No hay cronograma CPM formal — o existe pero nadie lo consulta ni actualiza','Existe en Excel o MS Project pero se actualiza menos de una vez al mes','Se actualiza semanalmente por alguien del equipo técnico con datos del campo','CPM activo: camino crítico, float y dependencias recalculados automáticamente']},

// STORAGE
// ═══════════════════════════
const SK='sinergia_evaluaciones', PK='sinergia_progreso';
function sg(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true;}catch{return false;}}
function sr(k){try{localStorage.removeItem(k);}catch{}}
function getEvals(){return sg(SK)||[];}
function saveProgress(){ss(PK,{secIdx:S.secIdx,answers:S.answers,company:S.company,ts:Date.now()});}
function clearProgress(){sr(PK);}
function saveEval(secs,overall,roadmap){
  const evs=getEvals();
  const e={id:Date.now(),fecha:new Date().toISOString(),empresa:S.company.name||'Sin nombre',contacto:S.company.contact||'',sector:S.company.sector||'',tamanio:S.company.size||'',proyectos:S.company.projects||'',respuestas:S.answers,puntajes:secs.map(s=>({id:s.id,label:s.label,pct:s.pct,weight:s.weight,color:s.color})),total:overall,etiqueta:statusFor(overall).label,roadmap:roadmap.map(r=>({name:r.name,area:r.area,hrs:r.hrs,pct:r.pct}))};
  evs.unshift(e);
  const ok=ss(SK,evs.slice(0,50));
  clearProgress();
  return ok;
}
function showToast(msg){
  const t=document.getElementById('toast');
  if(!t)return;
  t.className='toast show';t.textContent=msg;
  setTimeout(()=>t.classList.remove('show'),3800);
}
function updateHistLink(){
  const n=getEvals().length;
  const lnk=document.getElementById('hist-lnk');
  const cnt=document.getElementById('hist-cnt');
  if(!lnk)return;
  if(n>0){lnk.style.display='flex';cnt.textContent=`Historial (${n})`;}
  else{lnk.style.display='none';}
}

// ═══════════════════════════
// STATE
// ═══════════════════════════
let S={phase:'intro',secIdx:0,answers:{},company:{name:'',sector:'',size:'',contact:'',projects:''}};
const main=document.getElementById('main');

function init(){
  updateHistLink();
  const prog=sg(PK);
  if(prog&&Object.keys(prog.answers||{}).length>0){
    S.secIdx=prog.secIdx||0;S.answers=prog.answers||{};S.company=prog.company||S.company;
    const totalQ=SECTIONS.reduce((a,s)=>a+s.questions.length,0);
    S.phase=Object.keys(S.answers).length>=totalQ?'results':'resume';
  }
  render();
}

function render(){
  window.scrollTo({top:0,behavior:'smooth'});
  if(S.phase==='intro')renderIntro();
  else if(S.phase==='resume')renderResume();
  else if(S.phase==='survey')renderSurvey();
  else renderResults();
}

function startSurvey(){
  S.company.name=document.getElementById('fi-name').value.trim()||'Su empresa';
  S.company.contact=document.getElementById('fi-contact').value.trim()||'';
  S.company.sector=document.getElementById('fi-sector').value||'';
  S.company.size=document.getElementById('fi-size').value||'';
  S.company.projects=document.getElementById('fi-projects').value||'';
  S.phase='survey';S.secIdx=0;S.answers={};clearProgress();render();
}

// ═══════════════════════════
// RESUME
// ═══════════════════════════
function renderResume(){
  const answered=Object.keys(S.answers).length;
  const totalQ=SECTIONS.reduce((a,s)=>a+s.questions.length,0);
  const pct=Math.round((answered/totalQ)*100);
  const sec=SECTIONS[S.secIdx]||SECTIONS[0];
  main.innerHTML=`<div class="anim">
<div class="reh">
  <div class="reh-icon">🔄</div>
  <h2 class="reh-title">Tiene un diagnóstico en progreso</h2>
  <p class="reh-sub">Respondió <strong>${answered} de ${totalQ} preguntas</strong> (${pct}%) — quedó en <strong>"${sec.title}"</strong>.</p>
  <div class="reh-bar"><div class="reh-bar-fill" style="width:${pct}%"></div></div>
  <div class="reh-btns">
    <button class="btn btn-primary" onclick="S.phase='survey';render()">Continuar donde lo dejé →</button>
    <button class="btn btn-ghost" onclick="S={phase:'intro',secIdx:0,answers:{},company:{name:'',sector:'',size:'',contact:'',projects:''}};clearProgress();render()">Empezar de nuevo</button>
  </div>
</div></div>`;
}

// ═══════════════════════════
// SURVEY
// ═══════════════════════════
function renderSurvey(){
  const sec=SECTIONS[S.secIdx];
  const totalQ=SECTIONS.reduce((a,s)=>a+s.questions.length,0);
  const doneQ=SECTIONS.slice(0,S.secIdx).reduce((a,s)=>a+s.questions.length,0)+sec.questions.filter((_,qi)=>S.answers[S.secIdx+'_'+qi]!==undefined).length;
  const pct=Math.round((doneQ/totalQ)*100);
  const allDone=sec.questions.every((_,qi)=>S.answers[S.secIdx+'_'+qi]!==undefined);
  const isLast=S.secIdx===SECTIONS.length-1;
  main.innerHTML=`<div class="anim">
<div class="prog"><div class="prog-top"><span>${pct}% completado</span><span>${doneQ} de ${totalQ} respondidas</span></div><div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div></div>
<div class="sec-head">
  <span class="sec-pill" style="background:${sec.pillBg};color:${sec.pillColor}">${sec.pill}</span>
  <h2 class="sec-title">${sec.title}</h2>
  <p class="sec-sub">${sec.sub}</p>
</div>
${sec.questions.map((q,qi)=>{
  const sel=S.answers[S.secIdx+'_'+qi];
  const gIdx=SECTIONS.slice(0,S.secIdx).reduce((a,s)=>a+s.questions.length,0)+qi+1;
  return `<div class="q-card" id="qc-${S.secIdx}-${qi}">
    <div class="q-tag">Pregunta ${gIdx} de ${totalQ}</div>
    <p class="q-text">${q.text}</p>
    <div class="opts">${q.opts.map((o,oi)=>`<div class="opt ${sel===oi+1?'sel':''}" onclick="pick(${S.secIdx},${qi},${oi+1})"><span class="opt-b">${oi+1}</span><span>${o}</span></div>`).join('')}</div>
  </div>`;
}).join('')}
<div class="q-nav">
  <div class="nav-prog"><strong>${sec.questions.filter((_,qi)=>S.answers[S.secIdx+'_'+qi]!==undefined).length}</strong> de <strong>${sec.questions.length}</strong> respondidas en esta sección</div>
  <div class="nav-btns">
    ${S.secIdx>0?`<button class="btn btn-ghost" onclick="S.secIdx--;saveProgress();render()">← Anterior</button>`:''}
    <button class="btn btn-primary" onclick="${isLast?'finish()':'nextSec()'}" ${allDone?'':'disabled'}>${isLast?'Ver mi diagnóstico →':'Siguiente →'}</button>
  </div>
</div></div>`;
}

function pick(si,qi,score){
  S.answers[si+'_'+qi]=score;saveProgress();renderSurvey();
  const sec=SECTIONS[si];
  const next=sec.questions.findIndex((_,i)=>S.answers[si+'_'+i]===undefined);
  if(next!==-1)setTimeout(()=>{const el=document.getElementById('qc-'+si+'-'+next);if(el)el.scrollIntoView({behavior:'smooth',block:'center'});},100);
}
function nextSec(){if(!SECTIONS[S.secIdx].questions.every((_,qi)=>S.answers[S.secIdx+'_'+qi]!==undefined))return;S.secIdx++;saveProgress();render();}
function finish(){if(!SECTIONS[S.secIdx].questions.every((_,qi)=>S.answers[S.secIdx+'_'+qi]!==undefined))return;S.phase='results';render();}

// ═══════════════════════════
// SCORING
// ═══════════════════════════
function calcScores(){return SECTIONS.map((sec,si)=>{const scores=sec.questions.map((_,qi)=>S.answers[si+'_'+qi]||1);const raw=scores.reduce((a,b)=>a+b,0);const max=sec.questions.length*4;const pct=Math.round((raw/max)*100);const weakItems=sec.questions.map((q,qi)=>({q,score:S.answers[si+'_'+qi]||1})).filter(x=>x.score<=2).map(x=>x.q.text);return{...sec,raw,max,pct,weakItems};});}
function overallScore(secs){return Math.round(secs.reduce((a,s)=>a+(s.pct*s.weight/100),0));}
function statusFor(pct){
  if(pct<35)return{label:'Crítico',color:'#DC2626',bg:'#FEE2E2',ring:'#FCA5A5'};
  if(pct<55)return{label:'Deficiente',color:'#D97706',bg:'#FEF3C7',ring:'#FCD34D'};
  if(pct<70)return{label:'En desarrollo',color:'#0D9488',bg:'#CCFBF1',ring:'#5EEAD4'};
  if(pct<85)return{label:'Maduro',color:'#1E40AF',bg:'#DBEAFE',ring:'#93C5FD'};
  return{label:'Optimizado',color:'#064E3B',bg:'#D1FAE5',ring:'#6EE7B7'};
}
function priorityReason(sec){
  const R={
    costos:['Sin control de costos por rubro, los sobrecostos se descubren cuando el daño ya ocurrió.','El control existe pero la demora hace que las alertas lleguen tarde para actuar.','El sistema funciona pero hay brechas en automatización del cálculo EVM y alertas de CPI.','Buena base — agregar alertas automáticas de CPI y EAC potencia el control que ya existe.'],
    cronograma:['Sin CPM activo el proyecto navega sin mapa — los retrasos se acumulan invisiblemente.','El cronograma existe pero sin camino crítico actualizado ni baselines no hay control real.','CPM funcional pero la gestión de baselines múltiples y la detección temprana pueden mejorarse.','Cronograma maduro — agregar análisis de float paths y detección predictiva de retrasos con IA.'],
    lean:['Sin Last Planner ni PPC la planificación semanal es una promesa sin medición ni mejora.','Se planifica pero sin metodología Lean el equipo no puede mejorar su tasa de cumplimiento.','LPS parcial — digitalizar los tableros y automatizar el PPC multiplica el impacto del método.','LPS maduro — integrar IA en el análisis de causas raíz y el lookahead predictivo da el siguiente salto.'],
    riesgos:['Sin registro de riesgos los proyectos absorben impactos que eran previsibles y mitigables.','Los riesgos se identifican pero sin cuantificación no hay forma de priorizar ni presupuestar contingencias.','Análisis cualitativo establecido — agregar cuantificación probabilística da el rango que el directorio necesita.','Gestión de riesgos madura — integrar los planes de respuesta al cronograma CPM es el paso siguiente.'],
    recursos:['Sin visibilidad multi-proyecto la sobrecarga pasa desapercibida hasta que hay crisis.','Planificación básica pero sin histogramas ni nivelación los cuellos de botella son inevitables.','Control de recursos funcional — la nivelación multi-proyecto elimina los picos de sobrecarga.','Gestión de recursos sólida — la planificación de capacidad a largo plazo es el siguiente nivel.'],
    portafolio:['El directorio toma decisiones con información incompleta o con semanas de retraso sistemático.','Los datos existen pero sin dashboard consolidado cada decisión requiere trabajo manual.','Visibilidad parcial — automatizar el portafolio y los reportes elimina la preparación manual.','Portafolio bien instrumentado — los análisis what-if y la priorización estratégica son el próximo paso.'],
    comunicacion:['Sin actas estructuradas los compromisos se pierden y los mismos errores se repiten en cada obra.','Comunicación informal que genera trazabilidad cero — cualquier conflicto es difícil de resolver.','Proceso de actas establecido pero manual — automatizarlo con IA libera horas del equipo técnico.','Comunicación bien gestionada — la sincronización campo-oficina en tiempo real es el paso que falta.'],
    herramientas:['La baja adopción digital limita el impacto de cualquier mejora de proceso que se implemente.','Herramientas básicas sin integración — los datos están aislados y los procesos siguen siendo manuales.','Base digital razonable — integrar la app de campo y habilitar multi-usuario son las mejoras clave.','Equipo digital maduro — la app móvil offline y la colaboración simultánea generarán impacto inmediato.'],
  };
  const idx=sec.pct<35?0:sec.pct<55?1:sec.pct<70?2:3;
  return(R[sec.id]||['Área con oportunidad de mejora identificada.'])[idx];
}

// ═══════════════════════════
// RESULTS
// ═══════════════════════════
function renderResults(){
  const secs=calcScores();
  const overall=overallScore(secs);
  const ol=statusFor(overall);
  const sorted=[...secs].sort((a,b)=>a.pct-b.pct);
  const roadmap=sorted.slice(0,4).map((s,i)=>{const sp=SPRINT_MAP[s.id]||SPRINT_MAP.costos;return{...sp,id:s.id,pct:s.pct,weeks:`Semanas ${i*3+1}–${i*3+3}`,status:statusFor(s.pct)};});
  const totalHrs=roadmap.reduce((a,rm)=>{const n=parseInt(rm.hrs.split('–')[1])||10;return a+n;},0);
  const valUSD=Math.round(totalHrs*28*52/1000)*1000;
  const critN=secs.filter(s=>s.pct<35).length;
  const defN=secs.filter(s=>s.pct>=35&&s.pct<55).length;
  const summary=`${S.company.name} obtiene ${overall}/100 — nivel ${ol.label.toLowerCase()}. ${critN>0?`${critN} área${critN>1?'s están':'está'} en estado crítico. `:''}${defN>0?`${defN} área${defN>1?'s requieren':'requiere'} mejora prioritaria.`:''}`;
  const saved=saveEval(secs,overall,roadmap);
  updateHistLink();

  main.innerHTML=`<div class="anim">
<div class="${saved?'sav-banner':'sav-banner sav-warn'}">
  <span>${saved?'✓ Evaluación guardada automáticamente':'⚠ No se pudo guardar (almacenamiento no disponible)'}</span>
  ${saved?`<button class="sav-link" onclick="window.location.href='historial.html'">Ver historial →</button>`:''}
</div>
<div class="res-hero">
  <div>
    <div class="rh-eye">Diagnóstico · Área de Proyectos · ${new Date().toLocaleDateString('es-EC')}</div>
    <div class="rh-co">${S.company.name}</div>
    <div class="rh-meta">${[S.company.sector,S.company.size,S.company.projects].filter(Boolean).join(' · ')}${S.company.contact?' · '+S.company.contact:''}</div>
    <p class="rh-sum">${summary}</p>
  </div>
  <div class="score-ring" style="border-color:${ol.ring}60">
    <div class="sr-n" style="color:${ol.ring}">${overall}</div>
    <div class="sr-d">/ 100</div>
    <div class="sr-l" style="color:${ol.ring}">${ol.label}</div>
  </div>
</div>
<div class="sg" id="sg-a"></div>
<div class="sg2" id="sg-b"></div>
<div class="tbl-card a2">
  <div class="tbl-h">Áreas ordenadas por prioridad de intervención</div>
  ${sorted.map((s,i)=>{const st=statusFor(s.pct);return`<div class="p-row"><div class="p-num" style="background:${st.bg};color:${st.color}">${i+1}</div><div class="p-info"><div class="p-nm">${s.label}</div><div class="p-why">${priorityReason(s)}</div></div><div class="p-stat"><span class="sbadge" style="background:${st.bg};color:${st.color}">${st.label}</span><span class="p-pct" style="color:${st.color}">${s.pct}%</span></div></div>`;}).join('')}
</div>
<div class="rm-sec a3">
  <div class="rm-title">Roadmap recomendado de Sprints SinergIA</div>
  <div class="rm-sub">Los 4 Sprints con mayor impacto para su diagnóstico, en secuencia óptima de implementación</div>
  <div class="rm-grid">
    ${roadmap.map((rm,i)=>`<div class="rm-card ${i===0?'first':''}"><div class="rm-when">${rm.weeks}</div><div class="rm-sprint">${rm.name}</div><div class="rm-area">${rm.area}</div><span class="rm-hrs">${rm.hrs} recuperadas</span><div class="rm-score">Madurez actual: ${rm.pct}% · ${rm.status.label}</div></div>`).join('')}
  </div>
</div>
<div class="roi a4">
  <div class="roi-it"><div class="roi-n">~${totalHrs}</div><div class="roi-l">Horas semanales máx. recuperadas al completar los 4 Sprints prioritarios</div></div>
  <div class="roi-it"><div class="roi-n">$${(valUSD/1000).toFixed(0)}K</div><div class="roi-l">USD de valor anual estimado liberado (costo promedio $28/hora)</div></div>
  <div class="roi-it"><div class="roi-n">3 sem</div><div class="roi-l">Para tener el primer Sprint funcionando con garantía total de devolución</div></div>
</div>
<div class="ins-wrap a4">${buildInsights(secs,overall,sorted)}</div>
<div class="det-sec">
  <div class="det-title">Procesos específicos con brechas detectadas</div>
  <div class="det-grid">${sorted.slice(0,4).map(s=>{if(!s.weakItems||!s.weakItems.length)return'';const st=statusFor(s.pct);return`<div class="det-card"><div class="dc-a" style="color:${st.color}">${s.label} · ${s.pct}% — ${st.label}</div><ul class="dc-issues">${s.weakItems.slice(0,3).map(q=>`<li class="dc-issue"><span class="dc-dot" style="background:${st.color}"></span><span>${q}</span></li>`).join('')}</ul></div>`;}).join('')}</div>
</div>
<div class="cta-row">
  <button class="btn btn-primary" onclick="window.print()">Imprimir / Guardar PDF</button>
  <button class="btn btn-orange" onclick="restart()">Nuevo diagnóstico →</button>
  <button class="btn btn-violet" onclick="window.location.href='historial.html'">Ver historial →</button>
  <button class="btn btn-ghost" onclick="copyReport()">Copiar resumen</button>
</div>
</div>`;

  setTimeout(()=>{
    ['sg-a','sg-b'].forEach((id,ri)=>{
      const g=document.getElementById(id);if(!g)return;
      const arr=ri===0?secs.slice(0,4):secs.slice(4,8);
      g.innerHTML=arr.map(s=>{const st=statusFor(s.pct);return`<div class="sc"><div class="sc-n">${s.label}</div><div class="sc-p" style="color:${st.color}">${s.pct}%</div><div class="sc-bar"><div class="sc-bf" style="width:0%;background:${s.color}" data-w="${s.pct}"></div></div><div class="sc-s" style="color:${st.color}">${st.label} · ${s.weight}%</div></div>`;}).join('');
    });
    setTimeout(()=>document.querySelectorAll('.sc-bf[data-w]').forEach(el=>el.style.width=el.dataset.w+'%'),60);
  },60);
}

function buildInsights(secs,overall,sorted){
  let h='';
  const crit=secs.filter(s=>s.pct<35);
  const def=secs.filter(s=>s.pct>=35&&s.pct<55);
  const na=secs.filter(s=>['lean','riesgos','recursos'].includes(s.id)&&s.pct<55);
  const good=secs.filter(s=>s.pct>=75);
  if(crit.length>0)h+=`<div class="ins ins-crit"><div class="ins-l">Alerta crítica — acción inmediata requerida</div><div class="ins-t"><strong>${crit.map(s=>s.label).join(' y ')}</strong> ${crit.length>1?'están':'está'} en estado crítico (menos del 35% de madurez). Son puntos ciegos operativos donde las pérdidas ocurren sin visibilidad. Un Sprint de 3 semanas puede transformar cada área de cero control a alertas automáticas funcionando.</div></div>`;
  if(def.length>0)h+=`<div class="ins ins-warn"><div class="ins-l">Procesos manuales con alto costo de fricción</div><div class="ins-t"><strong>${def.map(s=>s.label).join(' y ')}</strong> tienen procesos que existen pero consumen tiempo valioso del equipo técnico. La IA no reemplaza el criterio del equipo — elimina el trabajo repetitivo que les impide aplicarlo.</div></div>`;
  if(na.length>0)h+=`<div class="ins ins-inf"><div class="ins-l">Capacidades estratégicas con bajo nivel de implementación</div><div class="ins-t"><strong>${na.map(s=>s.label).join(', ')}</strong> son áreas que las constructoras líderes de LATAM ya tienen implementadas como estándar operativo. Implementarlas eleva el nivel de madurez al estándar internacional de la industria.</div></div>`;
  if(overall>=55&&overall<75)h+=`<div class="ins ins-ok"><div class="ins-l">Empresa en transición — momento óptimo para IA</div><div class="ins-t">Superó la etapa de solo Excel y WhatsApp. Este es el momento exacto para agregar IA: los procesos ya existen, los datos ya fluyen, y la IA los potencia sin rediseñar desde cero.</div></div>`;
  if(good.length>0)h+=`<div class="ins ins-ok"><div class="ins-l">Fortalezas identificadas — base para escalar</div><div class="ins-t"><strong>${good.map(s=>s.label).join(' y ')}</strong> muestran madurez alta. En estas áreas el Sprint agrega inteligencia sobre procesos que ya funcionan.</div></div>`;
  h+=`<div class="ins ins-inf"><div class="ins-l">Potencial total identificado en este diagnóstico</div><div class="ins-t">Con los Sprints prioritarios el equipo puede recuperar entre <strong>30 y 60 horas semanales</strong>. Mientras el mercado LATAM opera debajo del 40% de madurez digital, las empresas que adoptan IA en los próximos 18 meses definen el nuevo piso competitivo del sector.</div></div>`;
  return h;
}

function restart(){S={phase:'intro',secIdx:0,answers:{},company:{name:'',sector:'',size:'',contact:'',projects:''}};clearProgress();render();}
function copyReport(){
  const secs=calcScores();const overall=overallScore(secs);const ol=statusFor(overall);const sorted=[...secs].sort((a,b)=>a.pct-b.pct);
  let t=`DIAGNÓSTICO ÁREA DE PROYECTOS — ${S.company.name}\nFecha: ${new Date().toLocaleDateString('es-EC')} | Puntaje: ${overall}/100 — ${ol.label}\n\nRESULTADOS POR ÁREA:\n`;
  secs.forEach(s=>{t+=`· ${s.label}: ${s.pct}% — ${statusFor(s.pct).label}\n`;});
  t+=`\nROADMAP RECOMENDADO (top 4):\n`;
  sorted.slice(0,4).forEach((s,i)=>{const sp=SPRINT_MAP[s.id];t+=`${i+1}. ${sp.name} — Semanas ${i*3+1}-${i*3+3}\n`;});
  t+=`\nGenerado por SinergIA by Human+AI · 2026`;
  navigator.clipboard.writeText(t).then(()=>showToast('✓ Resumen copiado al portapapeles')).catch(()=>alert('Seleccione el contenido manualmente con Ctrl+A.'));
}

init();
</script>
</body>
</html>
